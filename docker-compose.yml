services:
  carousell-bot:
    build:
      context: .
    image: carousell-bot:local
    container_name: carousell-bot
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      PORT: 3000
      NODE_ENV: production
      TZ: ${TZ:-Asia/Singapore}
      HOME: /tmp
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      DIGEST_EMAIL_TO: ${DIGEST_EMAIL_TO:-}
      DIGEST_SEND_TIME: ${DIGEST_SEND_TIME:-08:00}
    ports:
      - "${CAROUSELL_BOT_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    shm_size: "1gb"
