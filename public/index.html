<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carousell Bot</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Local PC test</p>
          <h1>Carousell Bot</h1>
        </div>
        <nav>
          <button class="nav-button active" data-view="dashboard">Dashboard</button>
          <button class="nav-button" data-view="search">Search</button>
          <button class="nav-button" data-view="listings">Listings</button>
          <button class="nav-button" data-view="settings">Filters</button>
        </nav>
      </aside>

      <main>
        <section id="dashboard" class="view active">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Market scan</p>
              <h2>Dashboard</h2>
            </div>
            <div class="toolbar-actions">
              <button id="density-toggle" type="button" aria-pressed="false">Compact</button>
              <button id="refresh">Refresh</button>
            </div>
          </div>
          <form id="dashboard-search-form" class="command-bar">
            <input id="dashboard-query" placeholder="Search Carousell from here..." aria-label="Dashboard search">
            <button type="submit">Search web</button>
          </form>
          <div id="stats" class="stats"></div>
          <div class="section-bar">
            <div>
              <h3>Latest Listings</h3>
              <p class="section-caption">Fresh visible posts, sorted for fast triage.</p>
            </div>
            <select id="dashboard-sort" aria-label="Dashboard sort">
              <option value="recent">Newest first</option>
              <option value="score" selected>Best score</option>
              <option value="price_low">Lowest price</option>
              <option value="price_high">Highest price</option>
            </select>
          </div>
          <div>
            <div id="latest-listings" class="grid"></div>
          </div>
          <div>
            <h3>Deal Candidates</h3>
            <div id="deals" class="grid"></div>
          </div>
        </section>

        <section id="search" class="view">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Carousell web search</p>
              <h2>Search</h2>
            </div>
          </div>
          <form id="search-form" class="search-row">
            <input id="search-input" name="query" placeholder="Search MacBook, AirPods, camera..." required>
            <input id="search-min-price" name="min_price" type="number" min="0" step="1" value="1" aria-label="Minimum price">
            <input id="search-max-price" name="max_price" type="number" min="0" step="1" placeholder="Max $" aria-label="Maximum price">
            <input id="search-location" name="location" placeholder="Location" aria-label="Location filter">
            <select id="search-recent-filter" aria-label="Recent filter">
              <option value="">Any age</option>
              <option value="1">Last hour</option>
              <option value="24">Today</option>
              <option value="168">This week</option>
            </select>
            <select id="search-sort" aria-label="Search result sort">
              <option value="score" selected>Best score</option>
              <option value="recent">Newest</option>
              <option value="price_low">Lowest $</option>
              <option value="price_high">Highest $</option>
            </select>
            <button type="submit">Search web</button>
            <button type="button" id="search-more">Search more</button>
          </form>
          <div id="search-summary" class="notice"></div>
          <div id="search-results" class="grid"></div>
          <h3>Recent Searches</h3>
          <div id="search-history" class="table"></div>
        </section>

        <section id="listings" class="view">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Classified posts</p>
              <h2>Listings</h2>
            </div>
            <select id="listing-filter">
              <option value="all" selected>All visible</option>
              <option value="clean">Clean WTS</option>
              <option value="filtered">Filtered</option>
            </select>
          </div>
          <div class="filter-bar">
            <label>Min <input id="listing-min-price" type="number" min="0" step="1" value="1"></label>
            <label>Max <input id="listing-max-price" type="number" min="0" step="1" placeholder="Any"></label>
            <label>Location <input id="listing-location" placeholder="Any"></label>
            <label>Recent
              <select id="listing-recent-filter">
                <option value="">Any age</option>
                <option value="1">Last hour</option>
                <option value="24">Today</option>
                <option value="168">This week</option>
              </select>
            </label>
            <label>Sort
              <select id="listing-sort">
                <option value="score" selected>Best score</option>
                <option value="recent">Newest</option>
                <option value="price_low">Lowest price</option>
                <option value="price_high">Highest price</option>
              </select>
            </label>
            <button id="clear-price-filters">Clear</button>
          </div>
          <div id="listing-list" class="grid"></div>
        </section>

        <section id="settings" class="view">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Blacklist control</p>
              <h2>Filters</h2>
            </div>
          </div>
          <form id="filter-form" class="form-row">
            <input name="phrase" placeholder="Phrase to block" required>
            <select name="type">
              <option value="blacklist">Word blacklist</option>
              <option value="spam_keyword">Spam keyword</option>
              <option value="bad_pricer">Stupid pricer</option>
            </select>
            <input name="reason" placeholder="Reason">
            <button>Add</button>
          </form>
          <div id="filters" class="table"></div>
          <h3>Training</h3>
          <div class="training-panel">
            <div id="training-stats" class="training-stats"></div>
            <button id="retrain-model">Retrain from labels</button>
          </div>
          <h3>Blocked Sellers</h3>
          <div id="sellers" class="table"></div>
        </section>
      </main>
    </div>
    <dialog id="details-modal">
      <div class="modal-header">
        <h3 id="details-title">Listing</h3>
        <button id="details-close">Close</button>
      </div>
      <div id="details-body"></div>
    </dialog>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
