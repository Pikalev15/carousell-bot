name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - fix/listing-data-quality

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
